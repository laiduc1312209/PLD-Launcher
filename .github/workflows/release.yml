name: Build and Release

on:
  push:
    tags:
      - 'v*' # Chạy khi push tag v1.0.0, v1.0.1, ...

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Launcher (main.exe)
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed `
            --icon=icon.ico `
            --add-data "icon.ico;." `
            main.py

      - name: Package Release (main.exe + icon.ico → PLD-Launcher.zip)
        run: |
          Copy-Item "icon.ico" "dist/"
          # Nén file vào zip
          Compress-Archive -Path "dist/main.exe", "dist/icon.ico" -DestinationPath "PLD-Launcher.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PLD-Launcher.zip
          draft: false
          prerelease: false
          generate_release_notes: true
